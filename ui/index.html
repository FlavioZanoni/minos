<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rule Guard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#0e0f12;color:#d6d9e0;font-family:'IBM Plex Sans',system-ui,sans-serif}
a{color:#6db2f2}a:hover{color:#9ccbf7}
*{box-sizing:border-box}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#2a2e36;border-radius:5px;border:2px solid #0e0f12}::-webkit-scrollbar-track{background:transparent}
input,textarea,select,button{font-family:inherit}
input:focus,textarea:focus,select:focus{outline:1px solid #4a7fb8;outline-offset:-1px}
::selection{background:#2b4a6b}
.mono{font-family:'JetBrains Mono',monospace}
.lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:#565b66;letter-spacing:.1em}
.flbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:#6b7180;letter-spacing:.1em}
.inp{background:#0e0f12;border:1px solid #2a2e36;border-radius:6px;padding:7px 10px;color:#d6d9e0;font-size:12.5px}
.row-hover:hover{background:#15171c}
.hdr-btn:hover{background:#ffffff}
.ghost-btn{background:none;border:1px solid #2a2e36;border-radius:6px;padding:9px 12px;color:#8b909c;font-size:12px;cursor:pointer}
.ghost-btn:hover{color:#d6d9e0;border-color:#3a3f48}
.sb-head:hover{background:#16181d}
.save-btn:hover{filter:brightness(1.15)}
.close-x{background:none;border:none;color:#6b7180;font-size:16px;cursor:pointer;padding:2px 6px;line-height:1}
.close-x:hover{color:#d6d9e0}
.field{display:flex;flex-direction:column;gap:5px}
.hint{font-size:10.5px;color:#6b7180}
</style>
</head>
<body>
<div id="app"></div>
<datalist id="model-options">
  <option value="claude-haiku-4-5-20251001"></option>
  <option value="claude-sonnet-5"></option>
  <option value="claude-opus-4-8"></option>
  <option value="claude-fable-5"></option>
</datalist>
<script>
'use strict';
const C = { warn:'#e0a63f', block:'#e05252', ai:'#a48af0', global:'#5aa2e8', project:'#58c99b' };
const GRID = 'display:grid;grid-template-columns:minmax(120px,160px) minmax(180px,1.7fr) minmax(120px,1fr) 80px minmax(90px,120px);gap:14px';
const DEFAULT_MODEL = 'claude-haiku-4-5-20251001';

let S = { scope:'global', server:null, globalCfg:{}, projectCfg:{},
  selectedId:null, editorOpen:false, isNew:false, draft:null,
  sandboxOpen:true, sbInput:'', sbCtx:'shell', sbPath:'src/auth.ts', aiVerdicts:null, aiRunning:false };

function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* Mirrors src/config.ts parseJsonc */
function parseJsonc(text){
  let out=''; let inStr=false, q='';
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(inStr){ out+=c; if(c==='\\'){out+=n;i++;} else if(c===q){inStr=false;} continue; }
    if(c==='"'||c==="'"){ inStr=true;q=c;out+=c;continue; }
    if(c==='/'&&n==='/'){ while(i<text.length&&text[i]!=='\n')i++; out+='\n'; continue; }
    if(c==='/'&&n==='*'){ i+=2; while(i<text.length&&!(text[i]==='*'&&text[i+1]==='/'))i++; i++; continue; }
    out+=c;
  }
  return JSON.parse(out.replace(/,(\s*[}\]])/g,'$1'));
}
function tryParse(raw){ if(!raw) return {}; try{ return parseJsonc(raw); }catch{ return {}; } }

/* Mirrors src/matchers.ts */
function globToRegex(glob){
  let core='';
  for(let i=0;i<glob.length;i++){
    const c=glob[i];
    if(c==='*'&&glob[i+1]==='*'&&glob[i+2]==='/'){ core+='(.*/)?'; i+=2; continue; }
    if(c==='*'&&glob[i+1]==='*'){ core+='.*'; i+=1; continue; }
    if(c==='*'){ core+='[^/]*'; continue; }
    if(c==='?'){ core+='[^/]'; continue; }
    if('.+^${}()|[]\\'.includes(c)){ core+='\\'+c; continue; }
    core+=c;
  }
  const anchorFull = glob.startsWith('/')||glob.startsWith('**/');
  return new RegExp(anchorFull ? `^${core}$` : `(^|/)${core}$`);
}
function matchesRule(rule, input){
  const a = rule.appliesTo || {};
  if(a.tools && !a.tools.includes(input.tool)) return false;
  if(input.event==='content'){
    if(a.pathGlob){ if(!input.path) return false;
      if(!a.pathGlob.some(g=>globToRegex(g).test(input.path))) return false; }
  } else if(input.event==='command'){
    if(a.commandMatch){ if(!input.command) return false;
      const cmd=input.command.toLowerCase();
      if(!a.commandMatch.some(s=>cmd.includes(s.toLowerCase()))) return false; }
  }
  return true;
}

function isProj(){ return S.scope==='project'; }
function accent(){ return isProj() ? C.project : C.global; }
function scopeCfg(){ return isProj() ? S.projectCfg : S.globalCfg; }
function projectName(){ return S.server.projectName || 'project'; }

/* Effective rule list for the current view: [{rule, source, disabled, disabledReason}] */
function viewRules(){
  if(!isProj()) return (S.globalCfg.rules||[]).map(r=>({rule:r, source:'global', disabled:false}));
  const active = (S.server.merged.rules||[]).map(r=>({rule:r, source:r.source, disabled:false}));
  const off = (S.server.merged.disabled||[]).map(d=>({rule:d.rule, source:'global', disabled:true, disabledReason:d.reason}));
  return active.concat(off);
}

function trigMeta(t){
  if(t.type==='contains') return {label:'keyword', c:'#8b909c'};
  if(t.type==='regex') return {label:'regex', c:'#c99bb0'};
  return {label:'AI judgment', c:C.ai};
}
function trigDetail(t){
  if(t.type==='contains') return (t.patterns||[]).join('  ·  ');
  if(t.type==='regex') return (t.patterns||[]).map(p=>'/'+p+'/').join('  ');
  return t.promptText ? '"'+t.promptText+'"' : (t.prompt||'');
}
function sourceBadge(v){
  const mono="white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:11px;";
  if(v.disabled) return {label:'disabled here', style:mono+'color:#6b7180', note:v.disabledReason||('global rule, off in '+projectName())};
  if(v.source==='project-override') return {label:'override', style:mono+`color:${C.project}`, note:'global · modified here'};
  if(v.source==='global') return {label:'global', style:mono+`color:${C.global}`, note:null};
  return {label:'project', style:mono+`color:${C.project}`, note:null};
}
function segBtn(active,color){
  return active
    ? `white-space:nowrap;background:${color}22;border:1px solid ${color};color:${color};border-radius:5px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'JetBrains Mono',monospace`
    : `white-space:nowrap;background:none;border:1px solid transparent;color:#8b909c;border-radius:5px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace`;
}

/* ---------- draft <-> rule mapping ---------- */
function emptyDraft(){ return { id:'', summary:'', tools:['Bash'], paths:'', commands:'', trigType:'contains',
  keywords:'', patterns:'', promptText:'', promptFile:'', tooling:false, action:'warn', message:'', _orig:null }; }
function draftFrom(r){
  const t=r.trigger||{};
  return { id:r.id, summary:r.summary||'', tools:[...(r.appliesTo&&r.appliesTo.tools||[])],
    paths:(r.appliesTo&&r.appliesTo.pathGlob||[]).join(', '),
    commands:(r.appliesTo&&r.appliesTo.commandMatch||[]).join(', '),
    trigType:t.type||'contains',
    keywords:t.type==='contains'?(t.patterns||[]).join('\n'):'',
    patterns:t.type==='regex'?(t.patterns||[]).join('\n'):'',
    promptText:t.promptText||'', promptFile:t.prompt||'', tooling:t.context==='tooling',
    action:r.action||'warn', message:r.message||'', _orig:r };
}
function splitList(s,sep){ return s.split(sep).map(x=>x.trim()).filter(Boolean); }
function ruleFromDraft(d){
  const appliesTo={};
  if(d.tools.length) appliesTo.tools=[...d.tools];
  const globs=splitList(d.paths,','); if(globs.length) appliesTo.pathGlob=globs;
  const cmds=splitList(d.commands,','); if(cmds.length) appliesTo.commandMatch=cmds;
  let trigger;
  if(d.trigType==='contains') trigger={type:'contains', patterns:splitList(d.keywords,'\n')};
  else if(d.trigType==='regex') trigger={type:'regex', patterns:splitList(d.patterns,'\n')};
  else { trigger={type:'llm-judge'};
    if(d.tooling) trigger.context='tooling';
    if(d.promptText.trim()) trigger.promptText=d.promptText.trim();
    if(d.promptFile.trim()) trigger.prompt=d.promptFile.trim(); }
  const rule={ ...(d._orig||{}), id:d.id.trim(), appliesTo, trigger, action:d.action };
  delete rule.source; delete rule.configDir; /* strip ResolvedRule fields when draft came from the merged view */
  if(d.summary.trim()) rule.summary=d.summary.trim(); else delete rule.summary;
  if(d.message.trim()) rule.message=d.message.trim(); else delete rule.message;
  return rule;
}

/* ---------- server io ---------- */
async function loadState(){
  const r=await fetch('/api/state');
  S.server=await r.json();
  S.scope=S.server.scope;
  S.globalCfg=tryParse(S.server.globalRaw); S.projectCfg=tryParse(S.server.projectRaw);
  renderApp();
}
async function putConfig(scope,cfg){
  const r=await fetch('/api/config',{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({scope,config:cfg})});
  if(!r.ok){ alert('Save failed: '+(await r.text())); return false; }
  S.server=await r.json();
  S.globalCfg=tryParse(S.server.globalRaw); S.projectCfg=tryParse(S.server.projectRaw);
  return true;
}

/* ---------- actions ---------- */
async function saveDraft(){
  const d=S.draft;
  if(!d.id.trim()){ alert('Rule id is required.'); return; }
  const cfg=scopeCfg();
  cfg.rules=cfg.rules||[];
  const rule=ruleFromDraft(d);
  const targetId=S.isNew?rule.id:S.selectedId;
  const i=cfg.rules.findIndex(r=>r.id===targetId);
  if(i>=0) cfg.rules[i]=rule; else cfg.rules.push(rule);
  if(await putConfig(S.scope,cfg)){ S.editorOpen=false; S.aiVerdicts=null; renderApp(); }
}
async function deleteRule(){
  const cfg=scopeCfg();
  cfg.rules=(cfg.rules||[]).filter(r=>r.id!==S.selectedId);
  if(await putConfig(S.scope,cfg)){ S.editorOpen=false; renderApp(); }
}
function isDisabledHere(id){
  return (S.projectCfg.disable||[]).some(e=>(typeof e==='string'?e:e.id)===id);
}
async function toggleDisabled(){
  const id=S.selectedId;
  const cfg=S.projectCfg;
  if(isDisabledHere(id)){
    cfg.disable=(cfg.disable||[]).filter(e=>(typeof e==='string'?e:e.id)!==id);
    if(!cfg.disable.length) delete cfg.disable;
  } else {
    const reason=prompt('Optional reason for disabling "'+id+'" in this project (blank = none):');
    if(reason===null) return;
    cfg.disable=cfg.disable||[];
    cfg.disable.push(reason.trim()?{id,reason:reason.trim()}:id);
  }
  if(await putConfig('project',cfg)){ S.editorOpen=false; renderApp(); }
}
async function saveJudgeModel(v){
  const cfg=scopeCfg();
  const model=v.trim();
  if(model){ cfg.judge={...(cfg.judge||{}),model}; }
  else if(cfg.judge){ delete cfg.judge.model; if(!Object.keys(cfg.judge).length) delete cfg.judge; }
  await putConfig(S.scope,cfg);
  renderApp();
}

/* ---------- sandbox ---------- */
function sbCheckInput(){
  return S.sbCtx==='shell'
    ? {event:'command', tool:'Bash', command:S.sbInput}
    : {event:'content', tool:'Edit', path:S.sbPath, content:S.sbInput};
}
function evalSandbox(){
  if(!S.sbInput.trim()) return [];
  const input=sbCheckInput();
  const out=[];
  for(const v of viewRules()){
    if(v.disabled) continue;
    const r=v.rule;
    if(!matchesRule(r,input)) continue;
    const t=r.trigger||{};
    if(t.type==='contains'){
      const hay=S.sbInput.toLowerCase();
      const hit=(t.patterns||[]).find(p=>hay.includes(p.toLowerCase()));
      if(hit) out.push({v,kind:r.action,why:`keyword match: "${hit}"`});
    } else if(t.type==='regex'){
      let hit=null;
      for(const p of (t.patterns||[])){
        try{ const m=S.sbInput.match(new RegExp(p,'m')); if(m){hit={p,m:m[0]};break;} }catch(e){}
      }
      if(hit) out.push({v,kind:r.action,why:`/${hit.p}/ matched "${hit.m.slice(0,40)}"`});
    } else {
      const verdict=S.aiVerdicts&&(r.id in S.aiVerdicts)?S.aiVerdicts[r.id]:undefined;
      if(verdict===undefined) out.push({v,kind:'ai',why:'sent to model for judgment — press "Run AI judgment"'});
      else if(verdict===null) out.push({v,kind:'ai-pass',why:'AI judged: passed'});
      else out.push({v,kind:r.action,why:'AI judged: '+(verdict.reason||'fired')});
    }
  }
  const ord=k=>k==='block'?0:k==='warn'?1:k==='ai'?2:3;
  out.sort((a,b)=>ord(a.kind)-ord(b.kind));
  return out;
}
async function runAI(){
  S.aiRunning=true; renderSb();
  try{
    const r=await fetch('/api/test',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(sbCheckInput())});
    const body=await r.json();
    S.aiVerdicts={};
    for(const v of viewRules()){
      if(v.disabled||!v.rule.trigger||v.rule.trigger.type!=='llm-judge') continue;
      const d=(body.decisions||[]).find(x=>x.ruleId===v.rule.id);
      S.aiVerdicts[v.rule.id]=d||null; /* null = judge passed / did not fire */
    }
  }catch(e){ alert('AI evaluation failed: '+e.message); }
  S.aiRunning=false; renderSb();
}

/* ---------- render ---------- */
function renderRows(){
  const acc=accent();
  return viewRules().map(v=>{
    const r=v.rule;
    const sel=S.selectedId===r.id&&S.editorOpen;
    const sb=sourceBadge(v);
    const tm=trigMeta(r.trigger||{});
    const act=r.action||'warn';
    const applies=(r.appliesTo&&r.appliesTo.tools||[]).join(' · ')
      +((r.appliesTo&&r.appliesTo.pathGlob||[]).length?'   '+r.appliesTo.pathGlob.join(', '):'')
      +((r.appliesTo&&r.appliesTo.commandMatch||[]).length?'   cmd: '+r.appliesTo.commandMatch.join(', '):'');
    return `<div data-act="select-rule" data-id="${esc(r.id)}" class="row-hover" style="${GRID};align-items:start;padding:13px 20px;border-bottom:1px solid #16181d;cursor:pointer;${sel?'background:#171a20;box-shadow:inset 2px 0 0 '+acc+';':''}${v.disabled?'opacity:.4;':''}">
      <div class="mono" style="font-size:12px;font-weight:500;color:${v.disabled?'#565b66':'#c3c8d2'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-top:1px">${esc(r.id)}</div>
      <div style="min-width:0">
        <div style="font-size:12.5px;color:${v.disabled?'#565b66':'#a8adb8'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.summary||r.message||'')}</div>
        <div class="mono" style="font-size:10.5px;color:#565b66;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(applies)}</div>
      </div>
      <div style="min-width:0">
        <span class="mono" style="white-space:nowrap;font-size:11px;color:${tm.c}">${tm.label}</span>
        <div class="mono" style="font-size:10.5px;color:#565b66;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(trigDetail(r.trigger||{}))}</div>
      </div>
      <div><span class="mono" style="white-space:nowrap;font-size:11px;font-weight:600;color:${act==='warn'?C.warn:C.block}">${act==='warn'?'▲ warn':'■ block'}</span></div>
      <div style="min-width:0">
        <div style="${sb.style}">${esc(sb.label)}</div>
        ${sb.note?`<div style="font-size:10px;color:#565b66;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(sb.note)}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderEditor(){
  if(!S.editorOpen) return '';
  const acc=accent();
  const d=S.draft;
  const selView=viewRules().find(v=>v.rule.id===S.selectedId);
  const fromGlobal=selView&&(selView.source==='global'||selView.disabled);
  const canDisable=!S.isNew&&isProj()&&fromGlobal;
  const ownScope=!S.isNew&&selView&&!selView.disabled&&(isProj()
    ? (selView.source==='project'||selView.source==='project-override')
    : selView.source==='global');
  const notice=(!S.isNew&&isProj()&&selView&&selView.source==='global')
    ? 'This is a global rule. Saving changes here creates a project override in '+projectName()+' — the global copy stays untouched.'
    : (S.isNew?(isProj()?'New rule will be written to the '+projectName()+' project config.':'New rule will be written to your global config and apply everywhere.'):null);
  const saveLabel=S.isNew?(isProj()?'Create in '+projectName():'Create globally')
    :((isProj()&&selView&&selView.source==='global')?'Save as project override':'Save rule');
  const tools=['Bash','Edit','Write','Read','WebFetch'];
  for(const t of d.tools) if(!tools.includes(t)) tools.push(t);
  const chip=on=>`font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;border-radius:5px;cursor:pointer;${on?`background:${acc}22;border:1px solid ${acc};color:${acc}`:'background:#0e0f12;border:1px solid #2a2e36;color:#8b909c'}`;
  return `<div style="position:absolute;top:0;right:0;bottom:0;width:min(400px,92%);border-left:1px solid #24272e;background:#131519;overflow:auto;display:flex;flex-direction:column;z-index:5;box-shadow:-16px 0 40px rgba(0,0,0,.5)">
    <div style="display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #24272e;position:sticky;top:0;background:#131519;z-index:2">
      <span class="mono" style="font-size:11px;letter-spacing:.1em;color:#8b909c;white-space:nowrap">${S.isNew?'NEW RULE':'EDIT RULE'}</span>
      <button data-act="close-editor" class="close-x" style="margin-left:auto">×</button>
    </div>
    ${notice?`<div style="margin:12px 16px 0;padding:8px 10px;background:${acc}14;border:1px solid ${acc}55;border-radius:6px;font-size:11.5px;color:#a8adb8;line-height:1.45">${esc(notice)}</div>`:''}
    <div style="padding:14px 16px;display:flex;flex-direction:column;gap:14px">
      <div class="field"><label class="flbl">RULE ID</label>
        <input id="draft-id" value="${esc(d.id)}" spellcheck="false" class="inp mono" style="font-size:12px"></div>
      <div class="field"><label class="flbl">SUMMARY</label>
        <input id="draft-summary" value="${esc(d.summary)}" class="inp"></div>
      <div class="field" style="gap:6px"><label class="flbl">APPLIES TO · TOOLS</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${tools.map(t=>`<button data-act="tool-toggle" data-tool="${esc(t)}" style="${chip(d.tools.includes(t))}">${esc(t)}</button>`).join('')}
        </div></div>
      <div class="field"><label class="flbl">FILE PATH PATTERNS <span style="color:#464b55">(edits only, blank = all)</span></label>
        <input id="draft-paths" value="${esc(d.paths)}" spellcheck="false" placeholder="src/**, db/migrations/**" class="inp mono" style="font-size:11.5px"></div>
      <div class="field"><label class="flbl">COMMAND SUBSTRINGS <span style="color:#464b55">(commands only, blank = all)</span></label>
        <input id="draft-commands" value="${esc(d.commands)}" spellcheck="false" placeholder="git commit, git push" class="inp mono" style="font-size:11.5px"></div>
      <div class="field" style="gap:6px"><label class="flbl">TRIGGER TYPE</label>
        <div style="display:flex;background:#0e0f12;border:1px solid #2a2e36;border-radius:7px;padding:3px;gap:3px">
          <button data-act="trig-contains" style="${segBtn(d.trigType==='contains','#a8adb8')}">Keyword</button>
          <button data-act="trig-regex" style="${segBtn(d.trigType==='regex','#e8b4c8')}">Regex</button>
          <button data-act="trig-ai" style="${segBtn(d.trigType==='llm-judge',C.ai)}">AI judgment</button>
        </div>
        ${d.trigType==='contains'?`<div class="field">
          <textarea id="draft-keywords" spellcheck="false" rows="3" placeholder="one keyword per line" class="inp mono" style="font-size:11.5px;resize:vertical">${esc(d.keywords)}</textarea>
          <span class="hint">Fires when any keyword appears literally (case-insensitive), one per line.</span></div>`:''}
        ${d.trigType==='regex'?`<div class="field">
          <textarea id="draft-patterns" spellcheck="false" rows="3" placeholder="one pattern per line" class="inp mono" style="color:#e8b4c8;font-size:11.5px;resize:vertical">${esc(d.patterns)}</textarea>
          <span class="hint">JavaScript regex, one per line, matched case-sensitively.</span></div>`:''}
        ${d.trigType==='llm-judge'?`<div class="field">
          <textarea id="draft-prompt" rows="4" placeholder="Describe what the model should look for, phrased as a yes/no question." style="background:#0e0f12;border:1px dashed #4a4470;border-radius:6px;padding:7px 10px;color:#c9c2e8;font-size:12px;line-height:1.5;resize:vertical">${esc(d.promptText)}</textarea>
          <span class="hint">Each candidate edit/command is sent to the model with this question. Slower and non-deterministic — prefer keyword/regex when possible.</span>
          <label style="display:flex;align-items:center;gap:7px;font-size:11px;color:#8b909c;margin-top:2px">
            <input type="checkbox" id="draft-tooling" ${d.tooling?'checked':''}> include project tooling context</label>
          <input id="draft-promptfile" value="${esc(d.promptFile)}" spellcheck="false" placeholder="optional prompt file (relative to config dir; inline text wins)" class="inp mono" style="font-size:11px"></div>`:''}
      </div>
      <div class="field" style="gap:6px"><label class="flbl">ACTION WHEN FIRED</label>
        <div style="display:flex;gap:8px">
          <button data-act="act-warn" style="flex:1;padding:8px 6px;border-radius:6px;font-size:11.5px;cursor:pointer;font-family:'JetBrains Mono',monospace;${d.action==='warn'?`background:${C.warn}1f;border:1px solid ${C.warn};color:${C.warn};font-weight:600`:'background:#0e0f12;border:1px solid #2a2e36;color:#6b7180'}">▲ Warn — agent may proceed</button>
          <button data-act="act-block" style="flex:1;padding:8px 6px;border-radius:6px;font-size:11.5px;cursor:pointer;font-family:'JetBrains Mono',monospace;${d.action==='block'?`background:${C.block}22;border:1px solid ${C.block};color:${C.block};font-weight:600`:'background:#0e0f12;border:1px solid #2a2e36;color:#6b7180'}">■ Block — operation denied</button>
        </div></div>
      <div class="field"><label class="flbl">MESSAGE SHOWN TO AGENT</label>
        <textarea id="draft-message" rows="3" class="inp" style="font-size:12px;line-height:1.5;resize:vertical">${esc(d.message)}</textarea></div>
      <div style="display:flex;gap:8px;padding-top:2px">
        <button data-act="save-draft" class="save-btn" style="flex:1;background:${acc};color:#0e0f12;border:none;border-radius:6px;padding:9px 0;font-size:12.5px;font-weight:600;cursor:pointer">${esc(saveLabel)}</button>
        ${canDisable?`<button data-act="toggle-disable" class="ghost-btn">${isDisabledHere(S.selectedId)?'Re-enable here':'Disable here'}</button>`:''}
        ${ownScope?`<button data-act="delete-rule" class="ghost-btn">Delete</button>`:''}
      </div>
    </div>
  </div>`;
}

function renderSbResults(){
  const results=evalSandbox();
  const nBlock=results.filter(h=>h.kind==='block').length;
  const nWarn=results.filter(h=>h.kind==='warn').length;
  const nAI=results.filter(h=>h.kind==='ai').length;
  const cards=results.map(h=>{
    const col=h.kind==='block'?C.block:h.kind==='warn'?C.warn:h.kind==='ai-pass'?'#7fbf98':C.ai;
    const sb=sourceBadge(h.v);
    const badge=h.kind==='ai'?'? AI':h.kind==='ai-pass'?'✓ AI PASS':(h.kind==='block'?'■ BLOCK':'▲ WARN');
    const dashed=h.kind==='ai'||h.kind==='ai-pass';
    return `<div style="padding:10px 12px;border:1px solid ${col}33;border-left:3px solid ${col};background:${col}0a;border-radius:7px;flex:none">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="mono" style="white-space:nowrap;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:${col}1f;color:${col};border:1px ${dashed?'dashed':'solid'} ${col}55">${badge}</span>
        <span class="mono" style="font-size:12px;font-weight:500;color:#d6d9e0">${esc(h.v.rule.id)}</span>
        <span style="font-size:10.5px;color:#6b7180;margin-left:auto">${esc(sb.label)}</span>
      </div>
      <div class="mono" style="font-size:11px;color:${col};margin-top:5px">${esc(h.why)}</div>
      ${h.v.rule.message?`<div style="font-size:11.5px;color:#8b909c;margin-top:4px;line-height:1.45">${esc(h.v.rule.message)}</div>`:''}
    </div>`;
  }).join('');
  const empty=!S.sbInput.trim();
  const clean=!empty&&results.length===0;
  const aiBtn=nAI>0?`<button data-act="run-ai" class="ghost-btn" style="align-self:flex-start;margin-top:2px;padding:6px 10px;color:${C.ai};border-color:${C.ai}55" ${S.aiRunning?'disabled':''}>${S.aiRunning?'Running judge…':'Run AI judgment → (calls the judge model, takes seconds)'}</button>`:'';
  const summary=empty?'nothing to evaluate':`${nBlock} block · ${nWarn} warn · ${nAI} need AI judgment`;
  return { html:`${empty?`<div style="color:#565b66;font-size:12px;padding-top:8px">No input — type or paste something on the left.</div>`:''}
    ${cards}${aiBtn}
    ${clean?`<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid #2b4033;background:rgba(80,180,120,.06);border-radius:7px;font-size:12px;color:#7fbf98;flex:none">✓ No rules fire against this input — it would run without interference.</div>`:''}`,
    summary };
}

function renderSb(){
  const el=document.getElementById('sb-results');
  if(!el) return;
  const {html,summary}=renderSbResults();
  el.innerHTML=html;
  const target=document.getElementById('sb-summary');
  if(target) target.textContent=summary;
}

function renderApp(){
  const acc=accent();
  const sv=S.server;
  const vis=viewRules();
  const nActive=vis.filter(v=>!v.disabled).length;
  const mergedJudge=sv.merged.judge||{};
  const scopeJudgeModel=(scopeCfg().judge&&scopeCfg().judge.model)||'';
  const effModel=mergedJudge.command?'(custom command in config)':(mergedJudge.model||DEFAULT_MODEL);
  const judgeLocked=!!mergedJudge.command;
  document.getElementById('app').innerHTML=`
  <div style="display:flex;flex-direction:column;height:100vh;overflow:hidden">
    <div style="display:flex;align-items:center;gap:12px;height:54px;padding:0 18px;background:#15171c;border-bottom:1px solid #24272e;flex:none">
      <div style="width:22px;height:22px;border:2px solid #d6d9e0;border-radius:4px;display:flex;align-items:center;justify-content:center;flex:none"><div style="width:8px;height:8px;background:${acc};border-radius:1px"></div></div>
      <div style="display:flex;align-items:baseline;gap:8px">
        <span style="font-size:14.5px;font-weight:600;letter-spacing:.01em;white-space:nowrap">Rule Guard</span>
        <span class="mono" style="font-size:10.5px;color:#6b7180">v${esc(sv.version||'')}</span>
      </div>
      <div style="margin:0 auto;display:flex;align-items:center;gap:10px">
        <span class="mono" style="font-size:10px;color:#6b7180;letter-spacing:.12em">SCOPE</span>
        <div style="display:flex;background:#0e0f12;border:1px solid #2a2e36;border-radius:7px;padding:3px;gap:3px">
          <button data-act="scope-global" style="${segBtn(!isProj(),C.global)}">Global</button>
          <button data-act="scope-project" style="${segBtn(isProj(),C.project)}">Project · ${esc(projectName())}</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="mono" style="font-size:11px;color:#6b7180;white-space:nowrap">${nActive} active / ${vis.length} rules</span>
        <button data-act="new-rule" class="hdr-btn" style="background:#d6d9e0;color:#0e0f12;border:none;border-radius:6px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;flex:none">+ New rule</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:6px 18px;background:${acc}14;border-bottom:1px solid ${acc}55;flex:none;min-width:0;overflow:hidden">
      <div style="width:7px;height:7px;border-radius:50%;background:${acc};flex:none"></div>
      <span class="mono" style="font-size:11px;color:${acc};font-weight:600;letter-spacing:.04em;white-space:nowrap;flex:none">${isProj()?'PROJECT SCOPE':'GLOBAL SCOPE'}</span>
      <span class="mono" style="font-size:11px;color:#8b909c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0">${esc(isProj()?sv.projectPath:sv.globalPath)}</span>
      <span style="margin-left:auto;display:flex;align-items:center;gap:7px;flex:none">
        <span class="mono" style="font-size:10px;color:#6b7180;letter-spacing:.1em" title="Model used for AI-judgment rules, saved to this scope's config">JUDGE MODEL</span>
        <input id="judge-model" list="model-options" value="${esc(scopeJudgeModel)}" placeholder="${esc(effModel)}" spellcheck="false" ${judgeLocked?'disabled title="judge.command is set in config — the model field is ignored"':''}
          class="inp mono" style="width:230px;padding:4px 8px;font-size:11px${judgeLocked?';opacity:.5':''}">
      </span>
    </div>
    <div style="display:flex;flex:1;min-height:0;position:relative">
      <div style="flex:1;overflow:auto;min-width:0">
        <div style="${GRID};padding:9px 20px;border-bottom:1px solid #24272e;position:sticky;top:0;background:#0e0f12;z-index:2">
          <span class="lbl">RULE</span><span class="lbl">SUMMARY</span><span class="lbl">TRIGGER</span><span class="lbl">ACTION</span><span class="lbl">SOURCE</span>
        </div>
        ${renderRows()||'<div style="padding:26px 20px;color:#565b66;font-size:12.5px">No rules in this scope yet — hit “+ New rule”.</div>'}
      </div>
      ${renderEditor()}
    </div>
    <div style="flex:none;border-top:1px solid #24272e;background:#131519">
      <div data-act="toggle-sandbox" class="sb-head" style="display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;user-select:none">
        <span class="mono" style="font-size:11px;letter-spacing:.1em;color:#8b909c;font-weight:600;white-space:nowrap">TEST SANDBOX</span>
        <span style="font-size:11px;color:#565b66;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">paste a command or edit to see which rules fire</span>
        <span class="mono" style="margin-left:auto;font-size:11px;color:#6b7180">${S.sandboxOpen?'▾ collapse':'▸ expand'}</span>
      </div>
      ${S.sandboxOpen?`<div style="display:flex;gap:0;height:218px;border-top:1px solid #1d2027">
        <div style="flex:1;padding:12px 18px;display:flex;flex-direction:column;gap:8px;min-width:0;border-right:1px solid #1d2027">
          <div style="display:flex;gap:8px;align-items:center">
            <div style="display:flex;background:#0e0f12;border:1px solid #2a2e36;border-radius:6px;padding:2px;gap:2px">
              <button data-act="ctx-shell" style="${segBtn(S.sbCtx==='shell','#a8adb8').replace('padding:5px 12px','padding:4px 10px').replace('font-size:12px','font-size:11px')}">shell command</button>
              <button data-act="ctx-edit" style="${segBtn(S.sbCtx==='edit','#a8adb8').replace('padding:5px 12px','padding:4px 10px').replace('font-size:12px','font-size:11px')}">file edit</button>
            </div>
            ${S.sbCtx==='edit'?`<input id="sb-path" value="${esc(S.sbPath)}" spellcheck="false" placeholder="path being edited, e.g. src/auth.ts" class="inp mono" style="flex:1;padding:5px 9px;font-size:11px">`:''}
          </div>
          <textarea id="sb-input" spellcheck="false" placeholder="git push --force origin main" class="inp mono" style="flex:1;padding:9px 11px;font-size:12px;line-height:1.55;resize:none">${esc(S.sbInput)}</textarea>
          <span style="font-size:10.5px;color:#565b66">Evaluated live against the ${isProj()?esc(projectName())+' (merged)':'global'} rule set · <span id="sb-summary"></span></span>
        </div>
        <div id="sb-results" style="flex:1;overflow:auto;padding:12px 18px;min-width:0;display:flex;flex-direction:column;gap:8px;align-content:start"></div>
      </div>`:''}
    </div>
  </div>`;
  bindInputs();
  renderSb();
}

function bindInputs(){
  const on=(id,ev,fn)=>{ const el=document.getElementById(id); if(el) el.addEventListener(ev,fn); };
  on('draft-id','input',e=>S.draft.id=e.target.value);
  on('draft-summary','input',e=>S.draft.summary=e.target.value);
  on('draft-paths','input',e=>S.draft.paths=e.target.value);
  on('draft-commands','input',e=>S.draft.commands=e.target.value);
  on('draft-keywords','input',e=>S.draft.keywords=e.target.value);
  on('draft-patterns','input',e=>S.draft.patterns=e.target.value);
  on('draft-prompt','input',e=>S.draft.promptText=e.target.value);
  on('draft-promptfile','input',e=>S.draft.promptFile=e.target.value);
  on('draft-tooling','change',e=>S.draft.tooling=e.target.checked);
  on('draft-message','input',e=>S.draft.message=e.target.value);
  on('sb-input','input',e=>{S.sbInput=e.target.value;S.aiVerdicts=null;renderSb();});
  on('sb-path','input',e=>{S.sbPath=e.target.value;S.aiVerdicts=null;renderSb();});
  on('judge-model','change',e=>saveJudgeModel(e.target.value));
}

document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');
  if(!el) return;
  const act=el.dataset.act;
  if(act==='scope-global'){ S.scope='global'; S.editorOpen=false; S.aiVerdicts=null; renderApp(); }
  else if(act==='scope-project'){ S.scope='project'; S.aiVerdicts=null; renderApp(); }
  else if(act==='new-rule'){ S.editorOpen=true; S.isNew=true; S.selectedId=null; S.draft=emptyDraft(); renderApp(); }
  else if(act==='select-rule'){ const id=el.dataset.id; const v=viewRules().find(x=>x.rule.id===id);
    if(v){ S.selectedId=id; S.editorOpen=true; S.isNew=false; S.draft=draftFrom(v.rule); renderApp(); } }
  else if(act==='close-editor'){ S.editorOpen=false; renderApp(); }
  else if(act==='tool-toggle'){ const t=el.dataset.tool; const i=S.draft.tools.indexOf(t);
    if(i>=0) S.draft.tools.splice(i,1); else S.draft.tools.push(t); renderApp(); }
  else if(act==='trig-contains'){ S.draft.trigType='contains'; renderApp(); }
  else if(act==='trig-regex'){ S.draft.trigType='regex'; renderApp(); }
  else if(act==='trig-ai'){ S.draft.trigType='llm-judge'; renderApp(); }
  else if(act==='act-warn'){ S.draft.action='warn'; renderApp(); }
  else if(act==='act-block'){ S.draft.action='block'; renderApp(); }
  else if(act==='save-draft'){ saveDraft(); }
  else if(act==='delete-rule'){ if(confirm('Delete rule "'+S.selectedId+'" from the '+S.scope+' config?')) deleteRule(); }
  else if(act==='toggle-disable'){ toggleDisabled(); }
  else if(act==='toggle-sandbox'){ S.sandboxOpen=!S.sandboxOpen; renderApp(); }
  else if(act==='ctx-shell'){ S.sbCtx='shell'; S.aiVerdicts=null; renderApp(); }
  else if(act==='ctx-edit'){ S.sbCtx='edit'; S.aiVerdicts=null; renderApp(); }
  else if(act==='run-ai'){ runAI(); }
});

loadState();
</script>
</body>
</html>
